<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <canvas width="600" height="600"></canvas>

    <script>
    // Select the canvas element and get its 2D context
    // document.querySelector('canvas') finds the first <canvas> element in the HTML
        let canvas = document.querySelector('canvas');
        //canvas.width = window.innerWidth;  // Optional: set canvas width to full window width
        //canvas.height = window.innerHeight; or none  // Optional: set canvas height to full window height
        // getContext('2d') returns a 2D drawing context for the canvas
        const ctx = canvas.getContext('2d');
        // lineWidth sets the width of lines drawn (in pixels)
        ctx.lineWidth = 2;

        // Outer loop: iterates through rows (i = 0 to 4)
        for(let i = 0; i < 5; i++) {
            // Inner loop: iterates through columns (j = 0 to 4)
            for(let j = 0; j <  5; j++) {

                // let width = canvas.getWidth;  // Alternative: get canvas width dynamically
                // width defines the width of each rectangle in pixels
                let width = 60;
                // height defines the height of each rectangle in pixels
                let height = 60;
                // gap defines the space between rectangles in pixels
                let gap = 20;
                // x calculates horizontal position based on column index i
                let x = 100 + (width + gap) * i;
                // y calculates vertical position based on row index j
                let y = 100 + (height + gap) * j;

                // beginPath starts a new path for drawing
                ctx.beginPath();
                // rect() defines a rectangle at position (x, y) with given width and height
                ctx.rect(x, y, width, height);
                // stroke() draws the outline of the rectangle
                ctx.stroke();

                // beginPath starts a new path for the inner rectangle
                ctx.beginPath();
                // rect() defines an inner rectangle, offset by 8px and 15px smaller
                ctx.rect(x + 8, y + 8, width - 15, height - 15);

                // Fill every other rectangle with red
                // (i + j) % 2 calculates if the sum of row and column is even (checkerboard pattern)
                if ((i + j) % 2 === 0) {
                    // fillStyle sets the fill color to red
                    ctx.fillStyle = "red";
                    // fill() fills the rectangle with the current fillStyle
                    ctx.fill();
                }
                // stroke() draws the outline of the inner rectangle
                ctx.stroke();

            }
        }

        //ctx.fillStyle = 'blue';  // Alternative: set fill color to blue
        //ctx.fillRect(0, 0, canvas.width, canvas.height);  // Alternative: fill entire canvas with blue
        // lineWidth sets the width of lines to 10 pixels for the border
        ctx.lineWidth = 10;
        // beginPath starts a new path for drawing the canvas border
        ctx.beginPath();
        // rect() defines a rectangle covering the entire canvas
        ctx.rect(0, 0, canvas.width, canvas.height);
        // ctx.stroke();  // Commented out: would draw the border if enabled
         
        // Draw circle
        // lineWidth sets the width of lines to 5 pixels for the circle
        ctx.lineWidth = 5;
        // beginPath starts a new path for drawing the circle
        ctx.beginPath();
        // arc() defines a circle with center at (200, 200), radius 150, from 0 to 2*PI (full circle)
        ctx.arc(200, 200, 150, 0, Math.PI * 2);
        // ctx.stroke();  // Commented out: would draw the circle outline if enabled

    </script>
<p>end of line</p>    
</body>
